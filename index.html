<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matheus Godinho — Foto e Vídeo</title>
  <meta name="description" content="Matheus Godinho — Foto e Vídeo. Agende seu horário pelo WhatsApp.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    /* Banner inteiro clicável (abre o WhatsApp) */
    .banner {
      position: relative;
      display: block;
      width: 100%;
      max-width: 720px;   /* ajuste aqui se quiser maior/menor */
      line-height: 0;     /* remove espaço extra embaixo da imagem */
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(255, 221, 128, 0.25);
    }
    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Destaque visual sobre o botão "AGENDE SEU HORÁRIO" (apenas dica visual) */
    .btn-agenda {
      position: absolute;
      left: 55.5%;
      top: 48.5%;
      width: 29.2%;
      height: 15%;
      border-radius: 10px;
      pointer-events: none;      /* o link cobre o banner inteiro */
      transition: background .15s ease, box-shadow .15s ease;
    }
    .banner:hover .btn-agenda,
    .banner:focus-visible .btn-agenda {
      background: rgba(255, 255, 255, 0.10);
      box-shadow: 0 0 0 3px rgba(255, 221, 128, 0.85);
    }
    .banner:focus-visible { outline: none; }
  </style>
</head>
<body>
  <a class="banner"
     href="https://w.app/godinhofotovideo"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="Matheus Godinho — Foto e Vídeo. Agende seu horário pelo WhatsApp.">
    <img src="b3.png" alt="Matheus Godinho — Foto e Vídeo. Agende seu horário.">
    <span class="btn-agenda" aria-hidden="true"></span>
  </a>
</body>
</html>
